  - {item_id: hx_iud_contraception, text: 询问避孕方式(节育环及上环年限), weight: 1.0}
  - {item_id: hx_meds, text: 询问激素/抗凝等用药史, weight: 1.0}
  - {item_id: hx_gyn_history, text: 询问既往妇科疾病(如子宫肌瘤), weight: 1.0}
  - {item_id: hx_pregnancy_excl, text: 询问/排除妊娠可能, weight: 1.0}
