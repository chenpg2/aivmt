# 妇产科病例 1(复杂/急症)— 草稿,需妇产科老师审定
# 已迁移至正式 ClinicalCase 结构(Stream B)。临床内容逐字保留;原文未给出的字段填
# TODO_COLLAB(linter 报 WARNING,不臆造)。`difficulty` 为既有的临床复杂度标签;
# 标准化病人的“行为难度”是编译期参数,不写入病例文件。
case_id: obgyn_ectopic_zh_01
version: "1.0.0"
title: 停经后腹痛伴阴道流血(拟诊异位妊娠)
language: zh
specialty: obgyn
difficulty: complex

demographics:
  age: "28"
  sex: female
  occupation: TODO_COLLAB
  marital_status: 已婚

chief_complaint: 今天右下腹隐痛加重一天

hpi:
  onset: 今天加重,已一天
  location: 右下腹
  duration: 一天(本次加重)
  character: 隐痛
  aggravating: TODO_COLLAB
  relieving: TODO_COLLAB
  timing: TODO_COLLAB
  severity: TODO_COLLAB
  associated_symptoms: []

# 盆腔炎既往史是 ectopic vs PID 鉴别的关键线索,作为门控信息只放在 hidden_info(hi_pid),
# 由清单项 hx_pid 赚取,故不在此处的常规背景中重复(否则一般既往史提问即可泄露)。
pmh: []
medications: [TODO_COLLAB]
allergies: [TODO_COLLAB]
family_history: [TODO_COLLAB]
social_history: [TODO_COLLAB]

# 相关阴性(被问及时如实回答):原 persona 中的“没有发热,白带正常”。
# 结构化路径(from_clinical_case)不读取 persona 自由文本,必须在此结构化保留,
# 否则被问到白带时 SP 会按行为块默认回答“没有”,与原文“白带正常”相矛盾。
pertinent_negatives: [没有发热, 白带正常]

obgyn:
  lmp: 末次月经大约6周前;停经6周多
  menstrual_history: 平时月经规律,28-30天一次
  obstetric_history: 怀过一次孕,人工流产一次,没有生过孩子
  contraception: 近期用避孕套,但偶尔没用
  sexual_history: 已婚,有性生活

hidden_info:
  - info_id: hi_bleeding
    content: 今天伴有少量暗红色阴道流血。
    trigger: 询问阴道流血的量、颜色、持续时间(hx_bleeding)
  - info_id: hi_associated
    content: 今天站起来时有点头晕,有肛门坠胀感。
    trigger: 询问头晕/晕厥/肛门坠胀感等伴随症状(hx_associated)
  - info_id: hi_pid
    content: 三年前得过一次盆腔炎,吃药好了。
    trigger: 询问盆腔炎/妇科手术等既往史(hx_pid)

emotional_state: 口语化、简短,略带紧张和担忧。
disclosure_profile: 开场主诉只说一个最主要的症状;只回答被直接问到的内容,绝不主动透露;被问到没设定的细节就说“没有”或“不清楚”。

persona: |
  你是一位28岁女性。停经6周多,今天右下腹隐痛加重一天,伴少量暗红色阴道流血来就诊。
  你平时月经规律(28-30天一次),末次月经大约6周前。已婚,有性生活,近期用避孕套但偶尔没用。
  怀过一次孕,人工流产一次,没有生过孩子。今天站起来时有点头晕,有肛门坠胀感。
  没有发热,白带正常。三年前得过一次"盆腔炎",吃药好了。
  扮演要求:开场主诉只说一个最主要的症状(如“肚子疼”“月经不正常”“下面不舒服”),其余症状和细节即使相关也必须等被具体问到才说;只回答被直接问到的内容,绝不主动透露;说话口语化、简短,略带紧张和担忧;
  学生的用词实在听不懂时才简短问一句那是什么意思,听得懂就直接回答,不评论学生用词;被问到没设定的细节就说"没有"或"不清楚"。

history_checklist:
  - {item_id: hx_lmp, text: 询问末次月经/停经时间, weight: 1.0}
  - {item_id: hx_menstrual, text: 询问平时月经史(周期/规律性), weight: 1.0}
  - {item_id: hx_bleeding, text: 询问阴道流血的量、颜色、持续时间, weight: 1.0}
  - {item_id: hx_pain, text: 询问腹痛部位、性质、加重情况, weight: 1.0}
  - {item_id: hx_sexual_contraception, text: 询问性生活与避孕方式, weight: 1.0}
  - {item_id: hx_obstetric, text: 询问孕产史(孕次/产次/流产史), weight: 1.0}
  - {item_id: hx_associated, text: 询问头晕/晕厥/肛门坠胀感等伴随症状, weight: 1.0}
  - {item_id: hx_pid, text: 询问盆腔炎/妇科手术等既往史, weight: 1.0}
