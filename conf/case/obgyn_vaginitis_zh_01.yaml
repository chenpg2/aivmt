# 妇产科病例 3（简单）— 已填充完整,待临床合作者最终确认
# 已迁移至正式 ClinicalCase 结构(Stream B)。临床内容逐字保留;补充字段已填入
# 临床合理默认值供教学使用。`difficulty` 为临床复杂度标签;行为难度为编译期参数,不写入文件。
case_id: obgyn_vaginitis_zh_01
version: "1.0.0"
title: 白带增多伴外阴瘙痒(拟诊外阴阴道假丝酵母菌病)
language: zh
specialty: obgyn
difficulty: simple

demographics:
  age: "32"
  sex: female
  occupation: 会计
  marital_status: 已婚

chief_complaint: 近5天白带明显增多,像豆腐渣一样

hpi:
  onset: 近5天
  location: 外阴
  duration: 5天
  character: 白带明显增多,像豆腐渣一样
  aggravating: 夜间及走路摩擦时瘙痒更明显
  relieving: 暂时没有找到缓解办法
  timing: 持续存在,没有好转趋势
  severity: 瘙痒比较厉害,影响睡眠
  associated_symptoms: []

pmh: [无糖尿病, 以前没得过这种病(无类似阴道炎发作史)]
# 近期抗生素使用是假丝酵母菌病的关键诱因线索,作为门控信息只放在 hidden_info(hi_antibiotic),
# 由清单项 hx_trigger 赚取;阴道冲洗习惯同理放在 hi_hygiene(hx_hygiene)。两者均不在常规背景中重复。
medications: []
allergies: [无已知药物过敏]
family_history: [无特殊家族史]
social_history: []

# 相关阴性(被问及时如实回答):原 persona 中的“没有发热,没有腹痛,小便正常”。
pertinent_negatives: [没有发热, 没有腹痛, 小便正常]

obgyn:
  lmp: 末次月经两周前
  menstrual_history: 月经正常
  obstetric_history: 生过一个孩子,顺产
  contraception: 有避孕,不太可能怀孕
  sexual_history: 已婚,性伴侣固定,对方没有不舒服

hidden_info:
  - info_id: hi_itching
    content: 外阴很痒,有点灼热感。
    trigger: 询问瘙痒/灼热等局部症状(hx_itching)
  - info_id: hi_antibiotic
    content: 两周前感冒,自己吃了一周“消炎药”(抗生素)。
    trigger: 询问诱因(近期抗生素/糖尿病/妊娠)(hx_trigger)
  - info_id: hi_hygiene
    content: 平时偶尔用洗液冲洗。
    trigger: 询问卫生习惯(阴道冲洗等)(hx_hygiene)

emotional_state: 口语化,有点不好意思。
disclosure_profile: 开场主诉只说一个最主要的症状;只回答被直接问到的内容,不主动透露;没设定的细节回答“没有”。

persona: |
  你是一位32岁女性。近5天白带明显增多,像豆腐渣一样,外阴很痒,有点灼热感,来就诊。
  两周前感冒,自己吃了一周"消炎药"(抗生素)。没有发热,没有腹痛,小便正常。
  已婚,性伴侣固定,对方没有不舒服。月经正常,末次月经两周前,不太可能怀孕(有避孕)。
  没有糖尿病。以前没得过这种病。平时偶尔用洗液冲洗。
  扮演要求:开场主诉只说一个最主要的症状(如“肚子疼”“月经不正常”“下面不舒服”),其余症状和细节即使相关也必须等被具体问到才说;只回答被直接问到的内容,不主动透露;说话口语化,有点不好意思;
  学生的用词实在听不懂时才简短问一句那是什么意思,听得懂就直接回答,不评论学生用词;没设定的细节回答"没有"。

history_checklist:
  - {item_id: hx_discharge, text: 询问分泌物性状/颜色/气味, weight: 1.0}
  - {item_id: hx_itching, text: 询问瘙痒/灼热等局部症状, weight: 1.0}
  - {item_id: hx_trigger, text: 询问诱因(近期抗生素/糖尿病/妊娠), weight: 1.0}
  - {item_id: hx_partner, text: 询问性生活及伴侣有无症状, weight: 1.0}
  - {item_id: hx_lmp_pregnancy, text: 询问末次月经与妊娠可能, weight: 1.0}
  - {item_id: hx_recurrence, text: 询问既往类似发作史, weight: 1.0}
  - {item_id: hx_hygiene, text: 询问卫生习惯(阴道冲洗等), weight: 1.0}
