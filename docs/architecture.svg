<svg xmlns="http://www.w3.org/2000/svg" width="920" height="660" viewBox="0 0 920 660" role="img" aria-labelledby="ttl desc">
  <title id="ttl">AIVMT in medical education</title>
  <desc id="desc">A medical student practises history-taking with an AI standardized patient; the system returns automated competency assessment and immediate feedback to the learner, and the automated scores are validated against blinded faculty. The platform is low-cost, self-hosted, offline, and keeps learner data local.</desc>
  <!-- Education-centered schematic. svglib/magick-friendly: rect/line/polygon/text, presentation attributes only. -->
  <text x="460" y="40" font-family="Helvetica" font-size="21" font-weight="bold" fill="#1a2733" text-anchor="middle">An AI standardized patient for medical education</text>
  <text x="460" y="68" font-family="Helvetica" font-size="13" fill="#5b6b7a" text-anchor="middle">Students practise history-taking; the system gives competency feedback, validated against faculty</text>

  <!-- top row: the learning interaction -->
  <rect x="110" y="108" width="250" height="86" rx="9" fill="#d5e4f0" stroke="#2E5A88" stroke-width="1.6"/>
  <text x="235" y="146" font-family="Helvetica" font-size="16" font-weight="bold" fill="#1a2733" text-anchor="middle">Medical student</text>
  <text x="235" y="168" font-family="Helvetica" font-size="12.5" fill="#5b6b7a" text-anchor="middle">clinical-year learner</text>

  <rect x="560" y="108" width="270" height="86" rx="9" fill="#e8eef6" stroke="#2E5A88" stroke-width="1.6"/>
  <text x="695" y="146" font-family="Helvetica" font-size="16" font-weight="bold" fill="#1a2733" text-anchor="middle">AI standardized patient</text>
  <text x="695" y="168" font-family="Helvetica" font-size="12.5" fill="#5b6b7a" text-anchor="middle">plays the patient, by voice</text>

  <line x1="360" y1="151" x2="548" y2="151" stroke="#2E5A88" stroke-width="2"/>
  <polygon points="548,146 560,151 548,156" fill="#2E5A88"/>
  <text x="454" y="138" font-family="Helvetica" font-size="13" fill="#1a2733" text-anchor="middle">takes a history</text>
  <text x="454" y="183" font-family="Helvetica" font-size="11" fill="#5b6b7a" text-anchor="middle">(clinical communication)</text>

  <!-- encounter goes to assessment -->
  <line x1="690" y1="194" x2="478" y2="343" stroke="#2E5A88" stroke-width="2"/>
  <polygon points="473,335 470,347 483,341" fill="#2E5A88"/>
  <text x="624" y="268" font-family="Helvetica" font-size="12.5" fill="#1a2733" text-anchor="middle">encounter</text>

  <!-- assessment + feedback (the education value) -->
  <rect x="185" y="345" width="330" height="122" rx="9" fill="#d5e4f0" stroke="#2E5A88" stroke-width="1.6"/>
  <text x="350" y="382" font-family="Helvetica" font-size="15.5" font-weight="bold" fill="#1a2733" text-anchor="middle">Automated competency assessment</text>
  <text x="350" y="404" font-family="Helvetica" font-size="15.5" font-weight="bold" fill="#1a2733" text-anchor="middle">and immediate feedback</text>
  <text x="350" y="430" font-family="Helvetica" font-size="11.5" fill="#5b6b7a" text-anchor="middle">history-taking, communication,</text>
  <text x="350" y="446" font-family="Helvetica" font-size="11.5" fill="#5b6b7a" text-anchor="middle">clinical reasoning (8 domains)</text>

  <!-- feedback returns to the learner: the learning loop -->
  <line x1="235" y1="345" x2="235" y2="206" stroke="#2E5A88" stroke-width="2"/>
  <polygon points="230,206 235,194 240,206" fill="#2E5A88"/>
  <text x="150" y="272" font-family="Helvetica" font-size="12" fill="#2E5A88" text-anchor="middle">immediate</text>
  <text x="150" y="288" font-family="Helvetica" font-size="12" fill="#2E5A88" text-anchor="middle">feedback</text>

  <!-- faculty validation: the study's question -->
  <rect x="620" y="360" width="250" height="94" rx="9" fill="#e8eef6" stroke="#2E5A88" stroke-width="1.6"/>
  <text x="745" y="398" font-family="Helvetica" font-size="15" font-weight="bold" fill="#1a2733" text-anchor="middle">Blinded faculty</text>
  <text x="745" y="420" font-family="Helvetica" font-size="12" fill="#5b6b7a" text-anchor="middle">independent expert</text>
  <text x="745" y="436" font-family="Helvetica" font-size="12" fill="#5b6b7a" text-anchor="middle">scoring</text>

  <line x1="515" y1="406" x2="620" y2="406" stroke="#2E5A88" stroke-width="2"/>
  <polygon points="527,401 515,406 527,411" fill="#2E5A88"/>
  <polygon points="608,401 620,406 608,411" fill="#2E5A88"/>
  <text x="567" y="392" font-family="Helvetica" font-size="12" fill="#1a2733" text-anchor="middle">agreement</text>
  <text x="567" y="428" font-family="Helvetica" font-size="11" fill="#5b6b7a" text-anchor="middle">(validity)</text>

  <!-- equity + privacy property strip (technology as a property, not the focus) -->
  <rect x="110" y="556" width="700" height="58" rx="11" fill="#eef2f7" stroke="#9aa7b4" stroke-width="1.2"/>
  <text x="460" y="580" font-family="Helvetica" font-size="12.5" font-weight="bold" fill="#1a2733" text-anchor="middle">Equity and privacy by design</text>
  <text x="460" y="600" font-family="Helvetica" font-size="11.5" fill="#5b6b7a" text-anchor="middle">low-cost hardware, a self-hosted offline model, and learner data kept on the local server (no cloud)</text>
</svg>
